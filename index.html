<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis URL Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">URL Shortener </h1>
        
        <div class="space-y-4">
            <input id="longUrl" type="text" placeholder="Paste long URL (https://...)" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input id="customCode" type="text" placeholder="Custom Alias (e.g. gemini)" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="shortenUrl()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">Shorten URL</button>
        </div>

        <div id="result" class="mt-6 hidden p-4 bg-green-50 border border-green-200 rounded-lg break-all">
            <p class="text-sm text-green-700 font-semibold">Your short link:</p>
            <a id="shortLink"  href="#" target="_blank" class="text-blue-600 underline"></a>
        </div>

        <hr class="my-8">

        <h2 class="text-lg font-bold text-gray-800 mb-4">Check Analytics</h2>
        <div class="flex gap-2">
            <input id="statsCode" type="text" placeholder="Enter Alias" class="flex-1 p-2 border rounded-lg">
            <button onclick="getStats()" class="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-900">Check</button>
        </div>
        <p id="statsResult" class="mt-4 text-center font-mono text-xl text-blue-600 font-bold"></p>
    </div>

    <script>
        const BASE_URL = 'http://10.10.15.140:3002';

        async function shortenUrl() {
            const url = document.getElementById('longUrl').value;
            const code = document.getElementById('customCode').value;
            
            if(!url || !code) return alert("Please fill both fields");
            console.log(`${BASE_URL}/shorten?url=${encodeURIComponent(url)}&code=${code}`);
          
            // const response = await fetch(`${BASE_URL}/shorten?url=${encodeURIComponent(url)}&code=${code}`);
            const response = await fetch(`${BASE_URL}/shorten?url=${encodeURIComponent(url)}&code=${code}`);
            const text = await response.text();
            
            document.getElementById('result').classList.remove('hidden');
            const linkTag = document.getElementById('shortLink');
            linkTag.href = `${BASE_URL}/${code}`;
            linkTag.innerText = `${BASE_URL}/${code}`;
        }
      
        async function getStats() {
            const code = document.getElementById('statsCode').value;
            
         
            console.log(`${BASE_URL}/stats/${code}`);
            const response = await fetch(`${BASE_URL}/stats/${code}`);

            const data = await response.json();
            
            document.getElementById('statsResult').innerText = `Total Clicks: ${data.clicks}`;
        }
    </script>
</body>
</html>
